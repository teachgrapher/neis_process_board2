      part.items.forEach(([code, title, file]) => {
        const a = document.createElement("a");
        a.className = "file-btn";
        a.href = fileHref(code, title, file);
        a.innerHTML = '<span class="file-code">' + code + '</span><span>' + title + '</span>';
        a.dataset.text = (code + " " + title).toLowerCase();
        list.appendChild(a);
      });
      details.appendChild(list);
      partsEl.appendChild(details);
    });

    // 검색: 제목에 키워드가 포함된 문서만 남기고, 해당 Part를 자동으로 펼침
    const searchEl = document.getElementById("search");
    const noResult = document.getElementById("noResult");

    searchEl.addEventListener("input", () => {
      const q = searchEl.value.trim().toLowerCase();
      let total = 0;

      document.querySelectorAll("details.part").forEach(details => {
        let visible = 0;
        details.querySelectorAll("a.file-btn").forEach(a => {
          const show = !q || a.dataset.text.includes(q);
          a.style.display = show ? "" : "none";
          if (show) visible++;
        });
        details.style.display = visible ? "" : "none";
        if (q) details.open = visible > 0;
        else details.open = false;
        total += visible;
      });

      noResult.style.display = (q && total === 0) ? "block" : "none";
    });
  </script>
</body>
</html>
