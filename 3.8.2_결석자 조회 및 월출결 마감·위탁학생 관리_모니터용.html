menu":"[승인사항-상신함]","emphasis":"bottleneck"},{"id":"P10","lane":"학급담임교사","stage":"마감취소 및 재마감","label":"기결문서취소 이후 반별월출결마감관리에서 월출결마감을 취소하며, 취소 시 기존 월출결 통계자료는 모두 삭제되므로 재마감을 다시 진행한다.","menu":"[학급담임-학적-출결관리-출결관리-반별월출결마감관리]","emphasis":"loop"},{"id":"P11","lane":"학급담임교사","stage":"마감취소 및 재마감","label":"집계된 일출결 정보와 마감된 월출결 정보가 불일치하면 빨간색 '재마감 필요'가 표시되므로 해당 월을 취소한 후 재마감하여 학교생활기록부에 올바른 출결자료가 반영되도록 확인한다.","menu":"[학급담임-학적-출결관리-출결관리-반별월출결마감관리]","emphasis":"bottleneck"}],"edges":[{"id":"L01","source":"P09","target":"P03","type":"loop","label":"기결문서취소 후 마감취소"},{"id":"L02","source":"P10","target":"P03","type":"loop","label":"취소 후 재마감"},{"id":"L03","source":"P11","target":"P03","type":"loop","label":"재마감 필요 시 재마감"},{"id":"L04","source":"P06","target":"P07","type":"message","label":"출결 통지서 송부"}]}</script>
