실적관리]","emphasis":"key"},{"id":"P10","lane":"학교(승인·심의주체)","stage":"특례 처리(신입생·졸업생·정정)","label":"신입생의 입학 전(3월 1일~입학식 전) 봉사활동 및 졸업생의 졸업 후(졸업식 이후~2월 말) 봉사활동을 인정하며, 입학식 이전 활동은 사전계획서를 입학식 후 제출받아 사후 승인한다.","emphasis":"normal"},{"id":"P11","lane":"학교(승인·심의주체)","stage":"특례 처리(신입생·졸업생·정정)","label":"종업식 이후부터 진급처리 이전의 봉사활동 실적은 진급처리 이후 학급담임교사가 정정대장으로 입력하되, 정정 전 학업성적관리위원회의 심의(증빙서류)를 반드시 거친다.","menu":"[학급담임-학생생활-학교생활기록부관리-정정대장]","emphasis":"loop"},{"id":"P12","lane":"학급담임교사","stage":"특례 처리(신입생·졸업생·정정)","label":"사전 봉사활동 계획서를 학교장이 승인(허가)한 경우에만 해당 봉사활동을 실적으로 입력할 수 있다.","menu":"[학급담임-학생생활-창의적체험활동-봉사활동실적관리]","emphasis":"normal"}],"edges":[{"id":"L01","source":"P11","target":"P03","type":"loop","label":"정정대장 재입력"},{"id":"L02","source":"P12","target":"P03","type":"message","label":"학교장 승인 후 입력 가능"}]}</script>
