미리보기} 한 후 성적통지표(가정통신문)를 저장하거나 출력한다.","menu":"[성적-성적처리-성적통지표(가정통신문)관리]","emphasis":"normal"},{"id":"P10","lane":"교과담당교사","stage":"교양교과 이수관리","label":"(2022 개정, 1·2학년) 학년도·학기·학년·과목·강의실·검색조건을 선택하고 조회하여 '이수기준 충족여부'를 확인한 후 '이수여부'에 'P' 또는 'F'를 입력하고 저장한다.","menu":"[성적-성적처리-교양교과이수관리]","emphasis":"lead"},{"id":"P11","lane":"교과담당교사","stage":"교양교과 이수관리","label":"(2015 개정, 3학년) 이수대상 학생을 선택한 후 {전체이수선택}하고 확인하여 '이수여부'에 'P' 입력 여부를 확인하고 저장한다. 출결마감을 하지 않고 이수여부를 저장하면 안내 메시지가 나타난다.","menu":"[성적-성적처리-교양교과이수관리]","emphasis":"normal"},{"id":"P12","lane":"성적처리담당교사","stage":"성적산출 마감 및 승인","label":"학년도·학기·학년·산출기준을 선택하고 조회하여 모든 과목의 '마감여부(○)'를 확인·선택한 후 저장하고 확인창에서 확인한다. 학기별 과목 출결이 마감되어야 총 수업시수·출석시수·결과시수가 반영된다.","menu":"[성적-성적처리-성적산출마감관리]","emphasis":"bottleneck"},{"id":"P13","lane":"성적처리담당교사","stage":"성적산출 마감 및 승인","label":"{승인요청}하여 기안문을 상신하고 결재가 완료되면 {학생/학부모서비스반영}을 진행한다. 결재가 완결된 자료만 반영하도록 승인요청 완료 후 진행할 것을 권장한다.","menu":"[성적-성적처리-성적산출마감관리]","emphasis":"key"},{"id":"P14","lane":"성적처리담당교사","stage":"성적산출 마감 및 승인","label":"'학생/학부모서비스 반영' 창에서 '학생/학부모서비스 성적기준'을 선택하고 {반영}한다. 반영 이후 가정통신문을 수정하면 다시 반영해야 학부모에게 제공된다.","menu":"[성적-성적처리-성적산출마감관리]","emphasis":"normal"}],"edges":[{"id":"L01","source":"P12","target":"P06","type":"loop","label":"마감 해제 후 성적 재산출"}]}</script>
