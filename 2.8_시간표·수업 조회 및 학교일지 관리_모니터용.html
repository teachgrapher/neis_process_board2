.sheet{

}
.sheet svg{ display:block; width:100%; height:auto; margin:0 auto; page-break-inside:avoid }
.toolbar{ text-align:center; padding:14px; font-family:sans-serif }
.toolbar button{
  font-size:15px; font-weight:600; padding:10px 22px; cursor:pointer;
  background:#FFE14D; border:2px solid #111; border-radius:0; box-shadow:3px 3px 0 #111;
}
.toolbar .tip{ font-size:12px; color:#555; margin-top:8px }
@media print{
  body{ background:#fff }
  .toolbar{ display:none }
  .sheet{ width:auto; max-width:none; min-height:auto; margin:0; padding:0; box-shadow:none }
  .sheet svg{ width:194mm; height:auto; margin:0 auto }
