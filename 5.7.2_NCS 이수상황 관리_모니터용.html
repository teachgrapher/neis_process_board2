<script type="application/json" id="board-data">{"schema_version":1,"profile":"gov","title":"NCS 이수상황 관리","subtitle":"위탁·현장실습 학생의 능력단위 이수 결과를 등록하고 조회하며 이수시간을 재계산하는 절차.","lanes":["학급담임교사","위탁기관/현장실습 담당"],"stages":["능력단위 추가","이수상황 조회","이수시간 재계산","이수예정 능력단위 및 필수이수시간 조회"],"nodes":[{"id":"P01","lane":"학급담임교사","stage":"능력단위 추가","label":"학년도·계열/학년/학과·반을 확인하고 조회하여 학생을 클릭한 후 능력단위추가 화면으로 진입한다.","menu":"[학급담임-학생생활-자격증및NCS이수상황-국가직무능력표준이수상황관리]","emphasis":"lead"},{"id":"P02","lane":"학급담임교사","stage":"능력단위 추가","label":"능력단위 과목 변경 창에서 능력단위코드를 선택하고 이수시간·원점수·성취도를 입력하여 저장한다. 위탁학생만 입력 가능하며 본교 학생은 입력할 수 없다.","menu":"[학급담임-학생생활-자격증및NCS이수상황-국가직무능력표준이수상황관리]","emphasis":"key"},{"id":"P03","lane":"위탁기관/현장실습 담당","stage":"능력단위 추가","label":"위탁기관에서 위탁학생의 실무과목 없이 능력단위 이수 결과만을 보내온 경우 해당 결과를 학교에 전달한다.","menu":"","emphasis":"normal"},{"id":"P04","lane":"학급담임교사","stage":"이수상황 조회","label":"학년도·계열/학년/학과·반을 확인하고 조회하여 학생을 클릭한 후 국가직무능력표준 이수상황을 확인한다.","menu":"[학급담임-학생생활-자격증및NCS이수상황-국가직무능력표준이수상황조회]","emphasis":"lead"},{"id":"P05","lane":"학급담임교사","stage":"이수상황 조회","label":"가장 최신 버전의 능력단위코드를 선택하여 입력하고, 능력단위명이 존재하지 않는 경우에는 가장 유사한 능력단위명(능력단위코드)을 우선 입력한다.","menu":"[학급담임-학생생활-자격증및NCS이수상황-국가직무능력표준이수상황조회]","emphasis":"normal"},{"id":"P06","lane":"학급담임교사","stage":"이수상황 조회","label":"세부능력및특기사항에 유사교과명·실제 이수 교과명·실제 능력단위코드 등을 입력하여 유사 입력 내역을 보완한다.","menu":"[학적-위탁·현장실습학생관리-위탁·현장실습학생관리-자료관리]","emphasis":"normal"},{"id":"P07","lane":"학급담임교사","stage":"이수상황 조회","label":"교육과정 편성 시 '학생 선택' 능력단위로 수강 편성된 학생(도제학교 참여 학생 포함)은 학생선택추가를 이용하여 능력단위명·이수시간·원점수·성취도를 실제 기업에서 이수한 내용으로 추가 등록한다.","menu":"[학생생활-자격증및NCS이수상황-국가직무능력표준이수시간관리]","emphasis":"normal"},{"id":"P08","lane":"학급담임교사","stage":"이수상황 조회","label":"현장실습으로 인정점을 부여받은 능력단위의 성취도는 'P'로 입력하고, 정규교육과정 이외 교육활동으로 이수했거나 학적변동으로 성취도 산출이 불가한 능력단위는 '·'로 입력한다.","menu":"[학급담임-학생생활-자격증및NCS이수상황-국가직무능력표준이수상황관리]","emphasis":"normal"},{"id":"P09","lane":"위탁기관/현장실습 담당","stage":"이수시간 재계산","label":"현장실습생으로 등록한 학생의 능력단위 이수시간은 일출결마감에 따라 능력단위 시간표와 해당 교시의 출결 정보로 자동 계산되며, 마감 이후 시간표가 변경되거나 마감이 취소된 경우 계산내역이 반영되지 않는다.","menu":"[학급담임-학생생활-자격증및NCS이수상황-국가직무능력표준이수상황조회]","emphasis":"bottleneck"},{"id":"P10","lane":"학급담임교사","stage":"이수시간 재계산","label":"시간표 변경이나 일출결마감 취소로 계산내역이 반영되지 않은 경우 이수시간재계산을 다시 수행하며, 잘못 반영된 능력단위는 선택하여 삭제한다.","menu":"[학급담임-학생생활-자격증및NCS이수상황-국가직무능력표준이수상황조회]","emphasis":"loop"},{"id":"P11","lane":"학급담임교사","stage":"이수예정 능력단위 및 필수이수시간 조회","label":"학년도·학기·계열/학년/학과·반을 확인하고 조회한 후 학생을 클릭하여 이수예정 능력단위 및 필수이수시간을 확인한다.","menu":"[학급담임-학생생활-자격증및NCS이수상황-학생별이수능력단위및필수이수시간조회]","emphasis":"key"}],"edges":[{"id":"L01","source":"P03","target":"P02","type":"message","label":"위탁 이수결과 전달"},{"id":"L02","source":"P05","target":"P06","type":"message","label":"유사교과명 정보 입력"},{"id":"L03","source":"P10","target":"P02","type":"loop","label":"삭제 후 능력단위 재등록"}]}</script>
